name: Run G2Ray (with Cloudflare Tunnel)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Xray and Run Proxy with Cloudflare Tunnel
        env:
          UUID_CUSTOM: ${{ secrets.MY_UUID }}  # در صورت تمایل UUID ثابت
        run: |
          # 1. تولید UUID
          if [ -n "$UUID_CUSTOM" ]; then
            UUID="$UUID_CUSTOM"
            echo "Using custom UUID"
          else
            UUID=$(cat /proc/sys/kernel/random/uuid)
            echo "Generated UUID: $UUID"
          fi

          # 2. دانلود و نصب Xray-core
          echo "Downloading Xray..."
          wget -q -O /tmp/xray.zip https://github.com/XTLS/Xray-core/releases/download/v26.3.27/Xray-linux-64.zip
          unzip -q /tmp/xray.zip -d /tmp/xray
          sudo cp /tmp/xray/xray /usr/local/bin/xray
          sudo chmod +x /usr/local/bin/xray

          # 3. ساختن کانفیگ Xray (بدون TLS، چون تونل هندل می‌کند)
          cat > /tmp/config.json << EOF
          {
            "inbounds": [
              {
                "port": 443,
                "protocol": "vless",
                "settings": {
                  "clients": [{ "id": "$UUID" }],
                  "decryption": "none"
                },
                "streamSettings": {
                  "network": "xhttp",
                  "xhttpSettings": {
                    "mode": "packet-up",
                    "path": "/"
                  }
                }
              }
            ],
            "outbounds": [{ "protocol": "freedom" }]
          }
          EOF

          # 4. اجرای Xray
          sudo xray run -c /tmp/config.json &
          sleep 2

          # 5. دانلود و راه‌اندازی Cloudflare Tunnel
          echo "Setting up Cloudflare Tunnel..."
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

          # اجرای تونل (HTTP mode) و دریافت دامنه موقت
          # منتظر می‌مانیم تا دامنه در stdout چاپ شود
          ./cloudflared tunnel --url http://localhost:443 > /tmp/tunnel.log 2>&1 &
          TUNNEL_PID=$!

          # 6. استخراج دامنه trycloudflare.com از لاگ
          # صبر می‌کنیم تا دامنه ظاهر شود (حداکثر ۳۰ ثانیه)
          for i in {1..30}; do
            DOMAIN=$(grep -o 'https://[^ ]*\.trycloudflare\.com' /tmp/tunnel.log | head -1 | sed 's|https://||')
            if [ -n "$DOMAIN" ]; then
              break
            fi
            sleep 1
          done

          if [ -z "$DOMAIN" ]; then
            echo "Could not obtain Cloudflare domain!"
            cat /tmp/tunnel.log
            exit 1
          fi

          echo "Tunnel domain: $DOMAIN"

          # 7. ساخت لینک VLESS با دامنه تونل و TLS
          echo ""
          echo "============================================"
          echo " VLESS Proxy Link (Cloudflare Tunnel)"
          echo "============================================"
          echo "vless://$UUID@$DOMAIN:443?encryption=none&security=tls&sni=$DOMAIN&type=xhttp&mode=packet-up&path=%2F#G2Ray-Tunnel"
          echo "============================================"
          echo ""

          # 8. زنده نگه داشتن Job
          echo "Proxy and tunnel are running. Waiting (max 6h)..."
          sleep infinity
