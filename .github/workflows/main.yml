name: Run G2Ray

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Xray and Run Proxy
        env:
          # اگر خواستید از Secret خودتان استفاده کنید، UUID_CUSTOM را در تنظیمات مخزن بسازید
          # در غیر این صورت، به صورت خودکار یک UUID تصادفی تولید می‌شود
          UUID_CUSTOM: ${{ secrets.MY_UUID }}
        run: |
          # 1. تولید UUID (اولویت با Secret است، در غیر این صورت تصادفی)
          if [ -n "$UUID_CUSTOM" ]; then
            UUID="$UUID_CUSTOM"
            echo "Using UUID from secret"
          else
            UUID=$(cat /proc/sys/kernel/random/uuid)
            echo "Generated random UUID: $UUID"
          fi

          # 2. دانلود و نصب Xray-core
          echo "Downloading Xray..."
          wget -q -O /tmp/xray.zip https://github.com/XTLS/Xray-core/releases/download/v26.3.27/Xray-linux-64.zip
          unzip -q /tmp/xray.zip -d /tmp/xray
          sudo cp /tmp/xray/xray /usr/local/bin/xray
          sudo chmod +x /usr/local/bin/xray

          # 3. ساختن فایل کانفیگ Xray
          cat > /tmp/config.json << EOF
          {
            "inbounds": [
              {
                "port": 443,
                "protocol": "vless",
                "settings": {
                  "clients": [{ "id": "$UUID" }],
                  "decryption": "none"
                },
                "streamSettings": {
                  "network": "xhttp",
                  "xhttpSettings": {
                    "mode": "packet-up",
                    "path": "/"
                  }
                }
              }
            ],
            "outbounds": [{ "protocol": "freedom" }]
          }
          EOF

          # 4. اجرای Xray در پس‌زمینه
          sudo xray run -c /tmp/config.json &
          sleep 3

          # 5. گرفتن IP عمومی رانر
          IP=$(curl -s ifconfig.me)

          # 6. نمایش لینک VLESS
          echo ""
          echo "============================================"
          echo " VLESS Proxy Link"
          echo "============================================"
          echo "vless://$UUID@$IP:443?encryption=none&security=none&type=xhttp&mode=packet-up&path=%2F#G2Ray-Actions"
          echo "============================================"
          echo ""

          # 7. زنده نگه داشتن Job
          echo "Proxy is running. Waiting (max 6h)..."
          sleep infinity
