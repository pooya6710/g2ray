name: Run G2Ray (localhost.run tunnel)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Xray and expose via localhost.run
        env:
          UUID_CUSTOM: ${{ secrets.MY_UUID }}
        run: |
          # 1. تولید UUID (مشابه اسکریپت اصلی)
          if [ -n "$UUID_CUSTOM" ]; then
            UUID="$UUID_CUSTOM"
            echo "Using custom UUID"
          else
            UUID=$(cat /proc/sys/kernel/random/uuid)
            echo "Generated UUID: $UUID"
          fi

          # 2. دانلود و نصب Xray-core (بر اساس install.sh اصلی)
          echo "Downloading Xray..."
          wget -q -O /tmp/xray.zip https://github.com/XTLS/Xray-core/releases/download/v26.3.27/Xray-linux-64.zip
          unzip -q /tmp/xray.zip -d /tmp/xray
          sudo cp /tmp/xray/xray /usr/local/bin/xray
          sudo chmod +x /usr/local/bin/xray

          # 3. کانفیگ دقیقاً مطابق config.json اصلی پروژه (xhttp, packet-up, path /)
          cat > /tmp/config.json << EOF
          {
            "inbounds": [
              {
                "port": 443,
                "protocol": "vless",
                "settings": {
                  "clients": [{ "id": "$UUID" }],
                  "decryption": "none"
                },
                "streamSettings": {
                  "network": "xhttp",
                  "xhttpSettings": {
                    "mode": "packet-up",
                    "path": "/"
                  }
                }
              }
            ],
            "outbounds": [{ "protocol": "freedom" }]
          }
          EOF

          # 4. اجرای Xray
          sudo xray run -c /tmp/config.json &
          sleep 2

          # 5. برقراری تونل SSH معکوس با localhost.run (غیر Cloudflare)
          echo "Creating reverse tunnel with localhost.run..."
          # -R 80:localhost:443 یعنی پورت 80 عمومی به پورت 443 داخلی نگاشت می‌شود
          # localhost.run روی پورت 80 خودش TLS ارائه می‌دهد
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -R 80:localhost:443 nokey@localhost.run > /tmp/tunnel.log 2>&1 &
          TUNNEL_PID=$!

          # 6. استخراج دامنه اختصاص‌یافته
          for i in {1..30}; do
            DOMAIN=$(grep -oP 'https://\K[^\s]+' /tmp/tunnel.log | head -1)
            if [ -n "$DOMAIN" ]; then
              break
            fi
            sleep 1
          done

          if [ -z "$DOMAIN" ]; then
            echo "No domain received, tunnel log:"
            cat /tmp/tunnel.log
            exit 1
          fi

          echo "Public domain: $DOMAIN"

          # 7. ساخت لینک VLESS با تنظیمات اصلی پروژه (security=tls, xhttp, packet-up)
          echo ""
          echo "============================================"
          echo " VLESS Proxy Link (localhost.run)"
          echo "============================================"
          echo "vless://$UUID@$DOMAIN:443?encryption=none&security=tls&sni=$DOMAIN&type=xhttp&mode=packet-up&path=%2F#G2Ray-NO-CF"
          echo "============================================"
          echo ""

          # 8. زنده نگه داشتن job
          echo "Proxy is running. Waiting (max 6h)..."
          sleep infinity
