name: Run G2Ray

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v5

      - name: Setup and Run
        env:
          PASS: ${{ secrets.MY_UUID }}
        run: |
          chmod +x g2ray.sh
          
          # اگر UUID تنظیم نشده، یک UUID تصادفی بساز
          if [ -z "$PASS" ]; then
            PASS=$(curl -sk https://raw.githubusercontent.com/edrisranjbar/g2ray/main/uuid)
          fi
          
          # انتخاب پورت تصادفی
          PORT=$(( (RANDOM % 50000) + 10000 ))
          
          # ارسال UUID به عنوان آرگومان اول، و پورت را از طریق stdin تزریق می‌کنیم
          echo "$PORT" | bash g2ray.sh "$PASS"
