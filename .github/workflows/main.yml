name: Run G2Ray

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v5  # ارتقا به نسخه ۵ برای پشتیبانی از Node.js 24

      - name: Setup and Run
        env:
          PASS: ${{ secrets.MY_UUID }}
        run: |
          # دادن مجوز اجرا به اسکریپت (حل مشکل exit code 127)
          chmod +x g2ray.sh
          
          # بررسی و تنظیم UUID
          if [ -z "$PASS" ]; then
            PASS=$(curl -sk https://raw.githubusercontent.com/edrisranjbar/g2ray/main/uuid)
          fi
          
          # انتخاب پورت تصادفی
          PORT=$(( (RANDOM % 50000) + 10000 ))
          
          # اجرای اسکریپت اصلی
          bash g2ray.sh "$PASS" "$PORT"
